### Variables
$mainMod = SUPER
$left = h
$down = j
$up = k
$right = l
$term = foot
$menu = wofi --show drun

source = ~/.config/hypr/gestures.lua

### Monitor
monitor = eDP-1, preferred, auto, 1.5

### Input
input {
    kb_layout = us
    kb_options = caps:escape
    touchpad {
        tap-to-click = true
        natural_scroll = true
        scroll_factor = 0.5
        disable_while_typing = true
    }
    sensitivity = 0
}

### Autostart
exec-once = mako
exec-once = hyprpaper
exec-once = wlsunset -l 37.1 -L -8.6
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = sleep 1 && waybar -c ~/.config/waybar/config.hypr
exec-once = swayidle -w \
    timeout 300 'hyprlock' \
    timeout 600 'hyprctl dispatch dpms off' \
    resume 'hyprctl dispatch dpms on' \
    before-sleep 'hyprlock'

### Appearance
general {
    gaps_in = 8
    gaps_out = 4
    border_size = 2
    col.active_border = rgb(88c0d0)
    col.inactive_border = rgb(2e3440)
    layout = dwindle
}

decoration {
    rounding = 8
    blur {
        enabled = true
        size = 5
        passes = 2
        vibrancy = 0.1696
    }
    shadow {
        enabled = true
        range = 8
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 5, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
}

### Keybinds — Basics
bind = $mainMod, Return, exec, $term
bind = $mainMod SHIFT, Q, killactive
bind = $mainMod, D, exec, pkill wofi || wofi --show drun
bind = $mainMod SHIFT, C, exec, hyprctl reload
bind = $mainMod SHIFT, E, exec, ~/.local/bin/powermenu.sh
bind = $mainMod, F, fullscreen
bind = $mainMod SHIFT, SPACE, togglefloating

### Keyboard backlight
bind = $mainMod, F5, exec, sudo kbd-backlight 0
bind = $mainMod, F6, exec, sudo kbd-backlight 1

### Focus
bind = $mainMod, $left, movefocus, l
bind = $mainMod, $down, movefocus, d
bind = $mainMod, $up, movefocus, u
bind = $mainMod, $right, movefocus, r
bind = $mainMod, left, movefocus, l
bind = $mainMod, down, movefocus, d
bind = $mainMod, up, movefocus, u
bind = $mainMod, right, movefocus, r

### Move
bind = $mainMod SHIFT, $left, movewindow, l
bind = $mainMod SHIFT, $down, movewindow, d
bind = $mainMod SHIFT, $up, movewindow, u
bind = $mainMod SHIFT, $right, movewindow, r
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, down, movewindow, d
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, right, movewindow, r

### Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

### Scratchpad
bind = $mainMod SHIFT, minus, movetoworkspace, special
bind = $mainMod, minus, togglespecialworkspace

### Resize
bind = $mainMod, R, submap, resize
submap = resize
binde = , $left, resizeactive, -10 0
binde = , $down, resizeactive, 0 10
binde = , $up, resizeactive, 0 -10
binde = , $right, resizeactive, 10 0
binde = , left, resizeactive, -10 0
binde = , down, resizeactive, 0 10
binde = , up, resizeactive, 0 -10
binde = , right, resizeactive, 10 0
bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset

### Mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

### Media keys
bindel = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bindel = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindel = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bindel = , XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle
bindel = , XF86AudioPlay, exec, playerctl play-pause
bindel = , XF86AudioPause, exec, playerctl play-pause
bindel = , XF86AudioPrev, exec, playerctl previous
bindel = , XF86AudioNext, exec, playerctl next
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+

### Screenshots
bind = , XF86SelectiveScreenshot, exec, ~/.local/bin/screenshot.sh region
bind = $mainMod, XF86SelectiveScreenshot, exec, ~/.local/bin/screenshot.sh annotate

bind = $mainMod SHIFT, B, exec, pkill waybar || waybar -c ~/.config/waybar/config.hypr
